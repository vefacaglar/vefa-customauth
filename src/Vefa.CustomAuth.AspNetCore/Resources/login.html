<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - CustomAuth</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0f12;
            --card-bg: rgba(20, 24, 33, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #8e9cae;
            --accent-color: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --error-bg: rgba(239, 68, 68, 0.1);
            --error-border: rgba(239, 68, 68, 0.2);
            --error-text: #f87171;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent-color);
            filter: blur(140px);
            opacity: 0.12;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }
        .container {
            position: relative;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 2.5rem 2rem;
            border-radius: 24px;
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            max-width: 400px;
            width: 90%;
            z-index: 1;
            box-sizing: border-box;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .icon {
            width: 56px;
            height: 56px;
            background: var(--accent-gradient);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.25);
            transform: rotate(-5deg);
            transition: transform 0.3s ease;
        }
        .container:hover .icon {
            transform: rotate(0deg) scale(1.05);
        }
        .icon svg {
            width: 28px;
            height: 28px;
            fill: none;
            stroke: #ffffff;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.5px;
        }
        .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.35rem;
        }
        .alert-error {
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            color: var(--error-text);
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            text-align: left;
        }
        .alert-error svg {
            flex-shrink: 0;
            width: 18px;
            height: 18px;
            stroke: var(--error-text);
            stroke-width: 2;
            fill: none;
        }
        .form-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }
        .form-label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        .input-wrapper {
            position: relative;
        }
        .input-control {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            color: #ffffff;
            font-family: inherit;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: all 0.25s ease;
        }
        .input-control:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .btn-submit {
            display: block;
            width: 100%;
            background: var(--accent-gradient);
            color: #ffffff;
            border: none;
            padding: 0.85rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
            margin-top: 1.5rem;
        }
        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.35);
        }
        .btn-submit:active {
            transform: translateY(0);
        }
        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
            margin: 1.75rem 0 1.25rem;
        }
        .demo-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 0.75rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-align: center;
        }
        .demo-title {
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 0.25rem;
        }
        .demo-badge {
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="container">
        <div class="header">
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            <h1>Sign In</h1>
            <div class="subtitle">to continue to your application</div>
        </div>

        {{errorMarkup}}

        <form method="post" action="{{encodedLoginPath}}">
            <input type="hidden" name="returnUrl" value="{{encodedReturnUrl}}">
            <input type="hidden" name="{{encodedFormFieldName}}" value="{{encodedRequestToken}}">
            
            <div class="form-group">
                <label class="form-label" for="userName">Username</label>
                <div class="input-wrapper">
                    <input class="input-control" id="userName" name="userName" autocomplete="username" placeholder="Enter your username" required autofocus>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="input-wrapper">
                    <input class="input-control" id="password" name="password" type="password" autocomplete="current-password" placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">Sign In</button>
        </form>

        <div class="divider"></div>

        <div class="demo-box">
            <div class="demo-title">💡 Quick Demo Access</div>
            Use credentials <span class="demo-badge">demo</span> / <span class="demo-badge">demo</span>
        </div>
    </div>
</body>
</html>
